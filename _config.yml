# Basic
name:               "Zaki"
home:               "~/"
description:        "daily blog"

# URL
baseurl:            ""
#baseurl:            "" #For Root Domain
permalink:          /:year/:month/:day/:title/

# Markdown
markdown:           kramdown

# Navigation
nav:
  - name:           "Projects"
    href:           "projects"
  - name:           "About"
    href:           "about"

# Sass
sass:
  style:            compressed

# Not published. Setting this replaces Jekyll's default exclude list, so the
# usual Gemfile/vendor entries are repeated here in case one ever shows up.
exclude:
  - README.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - vendor

# Scopes
defaults:
  -
    scope:
      path:         ""
      type:         "pages"
    values:
      layout:       "page"
  -
    scope:
      path:         ""
      type:         "posts"
    values:
      layout:       "post"
